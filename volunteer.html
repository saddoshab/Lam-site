<section class="programs">
  <h2>Volunteer Application</h2>
  <p>Join our team on the ground in South Sudan. Fill the form below.</p>
  
  <form action="https://formspree.io/f/mwvdzzrl" method="POST" class="lam-form">
    <input type="hidden" name="_subject" value="New Volunteer Application - LAM">
    <label>Full Name</label>
    <input type="text" name="name" required>

    <label>Email</label>
    <input type="email" name="email" required>

    <label>Phone</label>
    <input type="tel" name="phone">

    <label>Location</label>
    <input type="text" name="location" placeholder="e.g. Juba">

    <label>Why do you want to volunteer?</label>
    <textarea name="message" rows="5" required></textarea>

    <button type="submit" class="btn btn-primary">Submit Application</button>
  </form>
</section>
